<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EntreeSortie — Étape 1</title>
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <main class="page">
      <form id="declaration-form" class="form-layout">
        <input type="hidden" id="editingId" name="editingId" />

        <fieldset class="stage stage-1">
          <legend>Étape 1</legend>

          <h2>Réservé SRH</h2>
          <label>Nom
            <input name="lastName" required />
            <small>Nom de l'agent</small>
          </label>
          <label>Prénom
            <input name="firstName" required />
            <small>Prénom de l'agent</small>
          </label>
          <label>Email
            <input name="email" type="email" required />
            <small>L'adresse e-mail de l'agent</small>
          </label>
          <label>Service
            <input name="department" required />
            <small>Le service d'affectation de l'agent</small>
          </label>
          <label>Date arrivée
            <input name="arrivalDate" type="date" required />
            <small>Date d'arrivée prévue de l'agent</small>
          </label>
          <div class="departure-row">
            <label>Date départ
              <input name="departureDate" id="departureDate" type="date" />
              <small>Date de départ prévue de l'agent</small>
            </label>
            <label class="check-inline">
              <input type="checkbox" id="noDepartureDate" name="noDepartureDate" />
              <span>Pas de date de fin</span>
            </label>
          </div>

          <h2>Réservé CDS</h2>
          <label>Bureau
            <input name="office" />
            <small>Le bureau de l'agent</small>
          </label>
          <label>Pôle
            <input name="team" />
            <small>Pôle dans le service</small>
          </label>
          <label>Fonction
            <input name="role" />
            <small>Responsable, adjoint, etc.</small>
          </label>
        </fieldset>

        <div class="actions">
          <button type="submit" id="submit-btn">Enregistrer</button>
          <button type="button" id="cancel-edit" class="secondary hidden">Annuler la reprise</button>
        </div>
        <p id="form-feedback" class="feedback" aria-live="polite"></p>
      </form>

      <section class="saved" aria-labelledby="saved-title">
        <div class="saved-head">
          <h2 id="saved-title">Demandes d'arrivée enregistrées</h2>
          <button id="clear-storage" type="button" class="secondary">Vider la liste</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Agent</th>
                <th>Service</th>
                <th>Date arrivée</th>
                <th>Date départ</th>
                <th>Terminer l'arrivée</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="saved-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js?v=4"></script>
  </body>
</html>
