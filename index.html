<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EntreeSortie — Déclaration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <form id="declaration-form" class="form-layout">
        <fieldset class="stage stage-1">
          <legend>Étape 1</legend>

          <h2>Réservé SRH</h2>
          <label>Nom
            <input name="lastName" required />
            <small>Nom de l'agent</small>
          </label>
          <label>Prénom
            <input name="firstName" required />
            <small>Prénom de l'agent</small>
          </label>
          <label>Email
            <input name="email" type="email" required />
            <small>L'adresse e-mail de l'agent</small>
          </label>
          <label>Service
            <input name="department" required />
            <small>Le service d'affectation de l'agent</small>
          </label>
          <label>Date arrivée
            <input name="arrivalDate" type="date" required />
            <small>Date d'arrivée prévue de l'agent</small>
          </label>
          <div class="departure-row">
            <label>Date départ
              <input name="departureDate" id="departureDate" type="date" />
              <small>Date de départ prévue de l'agent</small>
            </label>
            <label class="check-inline">
              <input type="checkbox" id="noDepartureDate" name="noDepartureDate" />
              <span>Pas de date de fin</span>
            </label>
          </div>

          <h2>Réservé CDS</h2>
          <label>Bureau
            <input name="office" />
            <small>Le bureau de l'agent</small>
          </label>
          <label>Pôle
            <input name="team" />
            <small>Pôle dans le service</small>
          </label>
          <label>Fonction
            <input name="role" />
            <small>Responsable, adjoint, etc.</small>
          </label>
        </fieldset>

        <fieldset class="stage stage-2">
          <legend>Étape 2</legend>

          <h2>Réservé SRH</h2>
          <label class="check-row">
            <input type="checkbox" name="sirhusValidated" />
            <span>Status validé dans Sirhus</span>
          </label>
          <label class="check-row">
            <input type="checkbox" name="resedaMailSent" />
            <span>Mail d'implantation dans Reseda</span>
          </label>

          <h2>Réservé CDS</h2>
          <label class="check-row">
            <input type="checkbox" name="iamTagged" />
            <span>IAM</span>
          </label>
          <label class="check-row">
            <input type="checkbox" name="preIamMatrixCompleted" />
            <span>Matrice pré-IAM remplie</span>
          </label>
        </fieldset>

        <button type="submit">Enregistrer</button>
        <p id="form-feedback" class="feedback" aria-live="polite"></p>
      </form>
    </main>

    <title>EntreeSortie - MVP</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>EntreeSortie</h1>
      <p>Gestion onboarding / offboarding - MVP</p>
    </header>

    <main>
      <section class="card">
        <h2>Créer une demande</h2>
        <form id="requestForm">
          <div class="grid">
            <label>
              Type de demande
              <select name="type" required>
                <option value="ENTREE">Entrée</option>
                <option value="SORTIE">Sortie</option>
              </select>
            </label>
            <label>
              Date effective
              <input type="date" name="effectiveDate" required />
            </label>
            <label>
              Nom
              <input type="text" name="lastName" required />
            </label>
            <label>
              Prénom
              <input type="text" name="firstName" required />
            </label>
            <label>
              Email
              <input type="email" name="email" required />
            </label>
            <label>
              Service
              <input type="text" name="department" required />
            </label>
            <label>
              Manager
              <input type="text" name="manager" required />
            </label>
          </div>

          <label>
            Besoins IT (matériel, logiciels, droits)
            <textarea name="itNeeds" rows="3"></textarea>
          </label>
          <label>
            Besoins logistiques (bureau, badge, clé)
            <textarea name="logisticsNeeds" rows="3"></textarea>
          </label>

          <button type="submit">Créer la demande</button>
        </form>
      </section>

      <section class="card">
        <h2>Vue globale</h2>
        <div id="globalTable"></div>
      </section>

      <section class="card">
        <h2>Tableaux par service</h2>
        <div class="boards" id="boards"></div>
      </section>

      <section class="card">
        <h2>Notifications automatiques</h2>
        <ul id="notifications"></ul>
      </section>

      <section class="card">
        <h2>Journal d'audit</h2>
        <ul id="auditLog"></ul>
      </section>
    </main>

    <template id="taskTemplate">
      <article class="task-item">
        <h4></h4>
        <p class="meta"></p>
        <label>
          Statut
          <select class="statusSelect">
            <option value="A_FAIRE">À faire</option>
            <option value="EN_COURS">En cours</option>
            <option value="BLOQUE">Bloqué</option>
            <option value="TERMINE">Terminé</option>
          </select>
        </label>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
