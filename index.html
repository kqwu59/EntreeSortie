<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EntreeSortie — Déclaration</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <form id="declaration-form" class="form-layout">
        <fieldset class="stage stage-1">
          <legend>Étape 1</legend>

          <h2>Réservé SRH</h2>
          <label>Nom
            <input name="lastName" required />
            <small>Nom de l'agent</small>
          </label>
          <label>Prénom
            <input name="firstName" required />
            <small>Prénom de l'agent</small>
          </label>
          <label>Email
            <input name="email" type="email" required />
            <small>L'adresse e-mail de l'agent</small>
          </label>
          <label>Service
            <input name="department" required />
            <small>Le service d'affectation de l'agent</small>
          </label>
          <label>Date arrivée
            <input name="arrivalDate" type="date" required />
            <small>Date d'arrivée prévue de l'agent</small>
          </label>
          <div class="departure-row">
            <label>Date départ
              <input name="departureDate" id="departureDate" type="date" />
              <small>Date de départ prévue de l'agent</small>
            </label>
            <label class="check-inline">
              <input type="checkbox" id="noDepartureDate" name="noDepartureDate" />
              <span>Pas de date de fin</span>
            </label>
          </div>

          <h2>Réservé CDS</h2>
          <label>Bureau
            <input name="office" />
            <small>Le bureau de l'agent</small>
          </label>
          <label>Pôle
            <input name="team" />
            <small>Pôle dans le service</small>
          </label>
          <label>Fonction
            <input name="role" />
            <small>Responsable, adjoint, etc.</small>
          </label>
        </fieldset>

        <fieldset class="stage stage-2">
          <legend>Étape 2</legend>

          <h2>Réservé SRH</h2>
          <label class="check-row">
            <input type="checkbox" name="sirhusValidated" />
            <span>Status validé dans Sirhus</span>
          </label>
          <label class="check-row">
            <input type="checkbox" name="resedaMailSent" />
            <span>Mail d'implantation dans Reseda</span>
          </label>

          <h2>Réservé CDS</h2>
          <label class="check-row">
            <input type="checkbox" name="iamTagged" />
            <span>IAM</span>
          </label>
          <label class="check-row">
            <input type="checkbox" name="preIamMatrixCompleted" />
            <span>Matrice pré-IAM remplie</span>
          </label>
        </fieldset>

        <button type="submit">Enregistrer</button>
        <p id="form-feedback" class="feedback" aria-live="polite"></p>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
